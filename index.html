<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광고 대시보드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F4F1;--sur:#fff;--sur2:#EFEEEA;--bdr:rgba(0,0,0,.08);--bdr2:rgba(0,0,0,.14);
  --tx:#18181B;--tx2:#6B6B6F;--tx3:#A0A09C;
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-tx:#1E40AF;
  --green-bg:#F0FDF4;--green-tx:#15803D;
  --red:#DC2626;--red-bg:#FEF2F2;--red-tx:#991B1B;
  --amber-bg:#FFFBEB;--amber-tx:#92400E;
  --r:10px;--r-lg:14px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 16px rgba(0,0,0,.09);
}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;font-size:clamp(11px,1.1vw,16px);line-height:1.4}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:1fr 320px;height:100vh;overflow:hidden}
.col-l{padding:clamp(10px,1.2vh,20px) clamp(12px,1.5vw,24px);overflow:hidden;display:flex;flex-direction:column;height:100vh}
.col-r{background:var(--sur);border-left:1px solid var(--bdr);padding:clamp(10px,1.2vh,18px);height:100vh;overflow-y:auto;display:flex;flex-direction:column}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:clamp(4px,.5vh,8px);flex-shrink:0}
.logo{font-size:clamp(13px,1.3vw,20px);font-weight:700;letter-spacing:-.4px}
.logo span{color:var(--blue)}
.top-btns{display:flex;gap:6px}
.btn{font-size:clamp(10px,0.9vw,14px);padding:5px 12px;border-radius:8px;border:1px solid var(--bdr2);background:var(--sur);color:var(--tx2);cursor:pointer;font-family:inherit;font-weight:500;transition:.12s;white-space:nowrap}
.btn:hover{background:var(--sur2);color:var(--tx)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.primary:hover{background:#1D4ED8}
.btn.secondary{background:#1C1C1E;color:#fff;border-color:#1C1C1E}
.btn.secondary:hover{background:#333}



/* ── Brand Legend ── */
.legend{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:clamp(3px,.4vh,7px);flex-shrink:0}
.leg-chip{font-size:clamp(9px,.8vw,12px);font-weight:500;padding:2px 8px;border-radius:20px;border:1px solid transparent;display:flex;align-items:center;gap:4px;cursor:pointer;transition:.15s;user-select:none}
.leg-chip:hover{filter:brightness(.93)}
.leg-chip.active{outline:2px solid currentColor;outline-offset:1px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.leg-chip.dimmed{opacity:.3}
.leg-dot{width:6px;height:6px;border-radius:50%}

/* ── Calendar ── */
.cal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:clamp(3px,.4vh,7px);flex-shrink:0}
.cal-month{font-size:clamp(13px,1.3vw,20px);font-weight:700;letter-spacing:-.3px}
.cal-nav{display:flex;gap:4px}
.cal-nav button{width:clamp(24px,2vh,32px);height:clamp(24px,2vh,32px);border-radius:8px;border:1px solid var(--bdr2);background:var(--sur);cursor:pointer;font-size:clamp(14px,1.4vw,20px);color:var(--tx2);display:flex;align-items:center;justify-content:center;transition:.12s}
.cal-nav button:hover{background:var(--sur2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--bdr);border:1px solid var(--bdr);border-radius:var(--r-lg);overflow:hidden;flex:1}
.dh{background:var(--sur2);text-align:center;font-size:clamp(8px,.7vw,11px);font-weight:700;color:var(--tx3);padding:0;height:clamp(16px,1.6vh,22px);letter-spacing:.04em;line-height:1;display:flex;align-items:center;justify-content:center}
.dh.sun{color:#EF4444}.dh.sat{color:var(--blue)}
.dc{background:var(--sur);padding:clamp(4px,.4vh,7px) clamp(4px,.4vw,6px);padding-bottom:clamp(20px,2.5vh,34px);cursor:pointer;transition:background .1s;position:relative;overflow:hidden}
.dc:hover{background:#FAFAF8}
.dc.other .dn{color:var(--tx3)}.dc.other{background:#FAFAF9}
.dc.tod{background:var(--blue-bg)}.dc.tod .dn:not(.sat):not(.sun):not(.hol){color:var(--blue);font-weight:700}.dc.tod .dn{font-weight:700}
.dc.sel{outline:2px solid var(--blue);outline-offset:-2px}
.dn{font-size:clamp(10px,.9vw,14px);font-weight:600;color:var(--tx2);margin-bottom:2px}
.dn.sat{color:var(--blue)}
.dn.sun{color:#EF4444}
.dn.hol{color:#EF4444}
.hol-label{font-size:clamp(7px,.65vw,9px);color:#EF4444;font-weight:600;margin-bottom:1px;line-height:1.2}
.chip{font-size:clamp(8px,.7vw,11px);padding:1px 4px;border-radius:3px;margin-bottom:1px;display:flex;align-items:center;gap:2px;overflow:hidden;line-height:1.4;font-weight:500}
.chip-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.chip-txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.chip-alert{background:#FEF3C7;color:#92400E;border-left:2px solid #F59E0B}
.chip-end{background:#FEE2E2;color:#991B1B}
.chip-dl{background:#FEF9C3;color:#713F12;border-left:2px solid #EAB308}
.chip-more{font-size:clamp(8px,.7vw,11px);color:var(--tx3)}
/* ── Expiry Summary Bar ── */
.expiry-bar{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(130px,13vw,200px),1fr));gap:8px;margin-bottom:clamp(4px,.5vh,8px);flex-shrink:0}
.exp-card{background:#fff;border-radius:var(--r);border:1px solid var(--bdr);padding:clamp(8px,.9vh,13px) clamp(10px,1vw,16px);display:flex;align-items:center;gap:10px;min-width:0;box-shadow:var(--sh)}
.exp-card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.exp-card-body{flex:1;min-width:0}
.exp-card-name{font-size:clamp(9px,.85vw,12px);font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-card-badge{display:inline-block;margin-top:2px;font-size:clamp(8px,.75vw,11px);font-weight:700;padding:1px 7px;border-radius:20px}
.exp-urgent .exp-card-badge{background:#FEF2F2;color:#991B1B}
.exp-warn .exp-card-badge{background:#FFF7ED;color:#9A3412}
.exp-ok .exp-card-badge{background:#F0FDF4;color:#15803D}

/* ── Alert ── */
.alert-item{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-radius:8px;border-left:3px solid;font-size:clamp(9px,.85vw,12px);line-height:1.5}
.alert-d14{background:#FFF7ED;border-color:#EA580C;color:#9A3412}
.alert-d7{background:#FEF9C3;border-color:#EAB308;color:#713F12}
.alert-d2{background:#FEE2E2;border-color:#DC2626;color:#991B1B}
.alert-today{background:#EFF6FF;border-color:#2563EB;color:#1E40AF}
.alert-end{background:#F0FDF4;border-color:#16A34A;color:#15803D}
.alert-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.alert-body{flex:1;min-width:0}
.alert-title{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alert-sub{font-size:clamp(8px,.75vw,11px);opacity:.8;margin-top:1px}


.bar-wrap{position:absolute;bottom:3px;left:0;right:0;display:flex;flex-direction:column;gap:1px}
.bar-item{height:clamp(16px,1.8vh,22px);display:flex;align-items:center;overflow:hidden;font-size:clamp(8px,.65vw,10px);font-weight:600;color:#fff}
.bar-item.bar-start{border-radius:4px 0 0 4px;margin-left:6px;padding-left:6px}
.bar-item.bar-end{border-radius:0 4px 4px 0;margin-right:6px;padding-right:4px}
.bar-item.bar-mid{margin-left:0;margin-right:0;padding-left:0}
.bar-item.bar-solo{border-radius:4px;margin-left:6px;margin-right:6px;padding-left:6px}

/* ── Right Panel ── */
.panel-date{font-size:clamp(13px,1.3vw,20px);font-weight:700;letter-spacing:-.3px;margin-bottom:2px}
.panel-sub{font-size:clamp(10px,.9vw,13px);color:var(--tx3);margin-bottom:10px}
.tab-wrap{display:flex;background:var(--sur2);border-radius:9px;padding:3px;gap:2px;margin-bottom:10px;flex-shrink:0}
.tab-btn{flex:1;font-size:clamp(10px,.9vw,13px);font-weight:500;padding:6px 0;border-radius:7px;border:none;background:transparent;color:var(--tx2);cursor:pointer;font-family:inherit;transition:.12s}
.tab-btn.on{background:var(--sur);color:var(--tx);box-shadow:var(--sh)}

/* ── Rows ── */
.sec-hd{font-size:clamp(9px,.8vw,12px);font-weight:700;color:var(--tx3);letter-spacing:.06em;text-transform:uppercase;margin:10px 0 6px;display:flex;align-items:center;gap:5px}
.sec-hd:first-child{margin-top:0}
.sec-cnt{background:var(--sur2);color:var(--tx3);font-size:clamp(9px,.8vw,11px);padding:1px 6px;border-radius:8px}
.row{display:flex;align-items:flex-start;gap:7px;padding:7px 0;border-bottom:1px solid var(--bdr);position:relative}
.row:last-child{border-bottom:none}
.row:hover .row-acts{opacity:1}
.row-acts{display:flex;gap:3px;flex-shrink:0;opacity:0;transition:opacity .2s;margin-top:1px}
.row:hover .row-acts,.row-acts:focus-within{opacity:1}
.act-btn{font-size:clamp(9px,.8vw,12px);padding:3px 7px;border-radius:5px;border:.5px solid var(--bdr2);background:var(--sur);color:var(--tx2);cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap}
.act-btn:hover{background:var(--sur2);color:var(--tx)}
.act-btn.del{color:var(--red);border-color:#FECACA}
.act-btn.del:hover{background:var(--red-bg)}
.ck{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--bdr2);flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:transparent;transition:.12s}
.ck.done{background:#16A34A;border-color:#16A34A}
.ck.done::after{content:'';display:block;width:7px;height:5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.b-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.row-body{flex:1;min-width:0}
.row-title{font-size:clamp(10px,.95vw,14px);color:var(--tx);line-height:1.5;font-weight:500}
.row-title.done{text-decoration:line-through;color:var(--tx3);font-weight:400}
.row-sub{font-size:clamp(9px,.8vw,12px);color:var(--tx3);margin-top:1px}
.row-pills{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.pill{font-size:clamp(9px,.8vw,11px);padding:2px 6px;border-radius:9px;font-weight:600}
.pill-dl{background:var(--red-bg);color:var(--red-tx);border:1px solid #FECACA}
.pill-alert{background:#FEF9C3;color:#713F12}
.pill-contract{background:#DBEAFE;color:#1E3A8A}
.pill-event{background:#EDE9FE;color:#4C1D95}
.empty{text-align:center;padding:20px 0;color:var(--tx3);font-size:clamp(10px,.9vw,13px)}

/* ── Modals ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--sur);border-radius:var(--r-lg);padding:22px;width:420px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-md)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--tx)}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:5px;letter-spacing:.02em}
.fc{width:100%;padding:8px 11px;border:1px solid var(--bdr2);border-radius:8px;font-size:14px;font-family:inherit;color:var(--tx);background:var(--sur);outline:none;transition:.12s}
.fc:focus{border-color:var(--blue)}
textarea.fc{min-height:64px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;border-top:1px solid var(--bdr);padding-top:16px}

/* ── TO DO ── */
.todo-section{margin-bottom:10px}
.todo-section-hd{font-size:clamp(9px,.8vw,11px);font-weight:700;color:var(--tx3);letter-spacing:.06em;text-transform:uppercase;padding:6px 0 4px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);margin-bottom:4px}
.todo-add-btn{font-size:clamp(9px,.8vw,11px);padding:2px 8px;border-radius:6px;border:1px solid var(--bdr2);background:var(--sur);color:var(--blue);cursor:pointer;font-weight:600}
.todo-item{display:flex;align-items:flex-start;gap:7px;padding:6px 4px;border-bottom:1px solid var(--bdr);position:relative}
.todo-item:last-child{border-bottom:none}

.todo-body{flex:1;min-width:0}
.todo-text{font-size:clamp(10px,.9vw,13px);color:var(--tx);font-weight:500;line-height:1.4}
.todo-text.done{text-decoration:line-through;color:var(--tx3);font-weight:400}
.todo-meta{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;align-items:center}
.todo-pill{font-size:clamp(8px,.7vw,10px);padding:1px 6px;border-radius:8px;font-weight:600}

.todo-due{font-size:clamp(8px,.7vw,10px);color:var(--tx3)}
.todo-due.overdue{color:var(--red);font-weight:600}
.todo-empty{text-align:center;padding:12px 0;color:var(--tx3);font-size:clamp(9px,.8vw,12px)}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:8px}
@media(max-width:900px){.layout{grid-template-columns:1fr;height:auto;overflow:auto}body{height:auto;overflow:auto}.col-l{height:auto;overflow:visible}.col-r{position:static;height:auto;border-left:none;border-top:1px solid var(--bdr)}.stats{grid-template-columns:repeat(2,1fr)}.cal-grid{flex:none}}
</style>

</head>
<body>
<div class="layout">
<!-- ── 좌측: 달력 ── -->
<div class="col-l">
  <div class="topbar">
    <div class="logo">어댑트 <span>광고 대시보드</span> <span id="fb-status" style="font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:#FEF9C3;color:#92400E;margin-left:6px">● 동기화됨</span></div>
    <div class="top-btns">
      <button class="btn" onclick="openModal('task')">+ 업무 추가</button>
      <button class="btn secondary" onclick="openModal('schedule')">+ 브검/퀵윈 일정</button>
    </div>
  </div>
  <div class="legend" id="legend"></div>
  <div id="expiry-bar" class="expiry-bar" style="display:none;flex-shrink:0"></div>
  <div class="cal-hd">
    <div class="cal-month" id="cal-month"></div>
    <div class="cal-nav">
      <button onclick="chM(-1)">‹</button>
      <button onclick="chM(1)">›</button>
    </div>
  </div>
  <div class="cal-grid" id="cal"></div>
</div>

<!-- ── 우측: 패널 ── -->
<div class="col-r">
  <div id="panel-date-bar" style="font-size:clamp(11px,1.1vw,15px);font-weight:700;color:var(--tx);margin-bottom:6px;flex-shrink:0;display:flex;align-items:center;gap:6px">
    <span id="panel-date-txt" style="color:var(--blue)">날짜를 선택하세요</span>
  </div>
  <div class="tab-wrap" style="margin-top:0">
    <button class="tab-btn on" id="tab-chk" onclick="swTab('chk')">데일리 체크리스트</button>
    <button class="tab-btn" id="tab-todo" onclick="swTab('todo')">📋 TO DO</button>
  </div>
  <div id="pane-chk" style="flex:1;overflow-y:auto"></div>
  <div id="pane-todo" style="display:none;flex:1;overflow-y:auto"></div>
  <!-- 오늘의 운세 -->
  <div id="fortune-box" style="flex-shrink:0;margin-top:auto;padding-top:10px;border-top:1px solid var(--bdr)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div style="font-size:clamp(9px,.8vw,12px);font-weight:700;color:var(--tx3);letter-spacing:.05em;text-transform:uppercase">🔮 오늘의 운세</div>
      <div id="fortune-person" style="font-size:clamp(9px,.8vw,11px);color:var(--tx3)"></div>
    </div>
    <div id="fortune-content" style="font-size:clamp(10px,.9vw,13px);color:var(--tx);line-height:1.6;background:var(--sur2);border-radius:var(--r);padding:clamp(8px,.8vh,12px);min-height:60px">
      <span style="color:var(--tx3)">✨ 운세를 불러오는 중...</span>
    </div>
    <button class="btn" style="width:100%;margin-top:6px;font-size:clamp(8px,.75vw,11px)" onclick="nextFortunePerson()">다음 사람 → <span id="fortune-next-name"></span></button>
  </div>
</div>
</div>

<!-- ── TO DO 추가 모달 ── -->
<div class="modal-bg" id="modal-todo" onclick="if(event.target===this)closeTodoModal()">
<div class="modal" style="width:440px">
  <div class="modal-title">📋 TO DO 추가</div>
  <div class="fg"><label>담당자</label>
    <select class="fc" id="todo-person">
      <option value="공통">📋 공통</option>
      <option value="이경미">이경미</option>
      <option value="이세영">이세영</option>
      <option value="황유경">황유경</option>
      <option value="모다은">모다은</option>
      <option value="오승미">오승미</option>
    </select>
  </div>
  <div class="fg"><label>할 일</label>
    <input class="fc" type="text" id="todo-text" placeholder="예: 푸올 브검 소재 준비">
  </div>
  <div class="fg"><label>브랜드 태그</label>
    <select class="fc" id="todo-brand">
      <option value="">없음</option>
      <option value="전체">전체</option>
    </select>
  </div>
  <input type="hidden" id="todo-due" value="">
  <div class="mf">
    <button class="btn" onclick="closeTodoModal()">취소</button>
    <button class="btn primary" onclick="saveTodo()">저장</button>
  </div>
</div>
</div>

<!-- ── TO DO 수정 모달 ── -->
<div class="modal-bg" id="modal-todo-edit" onclick="if(event.target===this)closeTodoEditModal()">
<div class="modal" style="width:440px">
  <div class="modal-title">✏️ TO DO 수정</div>
  <div class="fg"><label>담당자</label>
    <select class="fc" id="todo-edit-person">
      <option value="공통">📋 공통</option>
      <option value="이경미">이경미</option>
      <option value="이세영">이세영</option>
      <option value="황유경">황유경</option>
      <option value="모다은">모다은</option>
      <option value="오승미">오승미</option>
    </select>
  </div>
  <div class="fg"><label>할 일</label>
    <input class="fc" type="text" id="todo-edit-text">
  </div>
  <div class="fg"><label>브랜드 태그</label>
    <select class="fc" id="todo-edit-brand">
      <option value="">없음</option>
      <option value="전체">전체</option>
    </select>
  </div>
  <div class="mf">
    <button class="btn" onclick="closeTodoEditModal()">취소</button>
    <button class="btn primary" onclick="saveTodoEdit()">저장</button>
  </div>
</div>
</div>

<!-- ── 알림 팝업 모달 ── -->
<div class="modal-bg" id="modal-alert" onclick="if(event.target===this)closeAlertPopup()">
<div class="modal" style="width:500px">
  <div class="modal-title" style="display:flex;align-items:center;gap:8px">
    <span style="font-size:20px">🔔</span> 오늘 주의 필요 일정
  </div>
  <div id="alert-popup-list" style="display:flex;flex-direction:column;gap:8px;max-height:55vh;overflow-y:auto"></div>
  <div class="mf" style="justify-content:space-between">
    <button class="btn" onclick="snoozeAlertToday()" style="color:var(--tx3)">오늘 하루 보지 않기</button>
    <button class="btn primary" onclick="closeAlertPopup()">확인</button>
  </div>
</div>

function setStatus(online){

}

async function fbGet(path){
  try{
    const r=await fetch(`${DB}/${path}.json`);
    if(!r.ok) throw new Error(r.status);
    return await r.json();
  }catch(e){ setStatus(false); return null; }
}
async function fbPost(path,data){
  try{
    const r=await fetch(`${DB}/${path}.json`,{method:'POST',body:JSON.stringify(data)});
    if(!r.ok) throw new Error(r.status);
    const res=await r.json();
    setStatus(true); return res.name;
  }catch(e){ setStatus(false); return null; }
}
async function fbPut(path,data){
  try{
    const r=await fetch(`${DB}/${path}.json`,{method:'PUT',body:JSON.stringify(data)});
    if(!r.ok) throw new Error(r.status);
    setStatus(true); return true;
  }catch(e){ setStatus(false); return false; }
}
async function fbDelete(path){
  try{

    setStatus(true); return true;

}
async function fbPatch(path,data){

const MEDIA_NAMES=['브검','퀵윈','키검','쇼검'];
function stripMedia(summary, media){
  // 해당 매체명 전체 제거 (앞/중간 어디든)
  let s=summary;
  MEDIA_NAMES.forEach(m=>{
    if(m===media) s=s.replace(new RegExp('(^|\\s)'+m+'\\s*','g'),' ').trim();
  });
  return s.trim();
}
function fmtChip(brand, media, summary){
  const s=stripMedia(summary, media);
  return `[${brand}] ${media} ${s}`;
}

function getChipsForDay(dstr){
  const chips = [];

  // tasks: due 날짜에 표시
  tasks.filter(t=>!filterBrand||t.brand===filterBrand).forEach(t=>{
    if(t.due === dstr){
      const c=bc(t.brand);
      chips.push({ color:bc(t.brand,t.media), label:fmtChip(t.brand,t.media,t.summary), type:'task', id:t.id, style:'normal' });
    }
    // 마감 기한 날짜가 due와 다를 때 마감 표시
    if(t.deadline && t.deadline !== t.due && t.deadline === dstr){
      const c=bc(t.brand);
      chips.push({ color:bc(t.brand,t.media), label:fmtChip(t.brand,t.media,t.summary)+' 마감', type:'task', id:t.id, style:'deadline' });
    }
  });

  // schedules
  schedules.filter(s=>!filterBrand||s.brand===filterBrand).forEach(s=>{
    const c=bc(s.brand,s.media);

    if(s.media==='퀵윈'){
      /* 퀵윈: 브랜드 색상을 진하게 적용 */
      if(dstr>=s.startDate && dstr<=s.endDate){
        const isStart=dstr===s.startDate, isEnd=dstr===s.endDate;
        const barPos=isStart&&isEnd?'solo':isStart?'start':isEnd?'end':'mid';
        chips.push({ color:c, label:fmtChip(s.brand,s.media,s.summary), type:'schedule', id:s.id, style:'bar', barPos });
      }
    } else {
      const isContract = s.type==='계약';
      const alertDays = isContract ? 14 : 2;
      const alertDate = addDays(s.endDate, -alertDays);
      const alertLabel = isContract ? 'D-14 재계약' : 'D-2 체크';
      if(s.startDate === dstr){
        chips.push({ color:c, label:fmtChip(s.brand,s.media,s.summary)+' 시작', type:'schedule', id:s.id, style:'start' });
      }
      if(alertDate === dstr && alertDate !== s.startDate && alertDate !== s.endDate){
        chips.push({ color:c, label:`[${s.brand}] ${s.media} ${alertLabel}`, type:'schedule', id:s.id, style:'alert' });
      }
      if(s.endDate === dstr){
        chips.push({ color:c, label:fmtChip(s.brand,s.media,s.summary)+' 종료', type:'schedule', id:s.id, style:'end' });
      }
    }
  });

  // 정기 반복 업무 (전체 표시 시만)
  if(!filterBrand) getRecurring(dstr).forEach(r=>{
    chips.push({ color:bc(r.brand,r.media),
      label:`[${r.brand}] ${r.summary}`, type:'recurring', id:r.id, style:'normal' });
  });
  return chips;
}

   CALENDAR RENDER
════════════════════════════════════════ */
function chM(d){ cm+=d; if(cm>11){cm=0;cy++} if(cm<0){cm=11;cy--} renderCal(); }

function renderCal(){
  document.getElementById('cal-month').textContent=`${cy}년 ${MONTHS[cm]}`;
  const g=document.getElementById('cal'); g.innerHTML='';
  DAYS.forEach((d,i)=>{
    const h=document.createElement('div');
    h.className='dh'+(i===0?' sun':i===6?' sat':'');
    h.textContent=d; g.appendChild(h);
  });
  const first=new Date(cy,cm,1), last=new Date(cy,cm+1,0), sdow=first.getDay();
  for(let i=0;i<sdow;i++){ const d=new Date(cy,cm,-sdow+i+1); g.appendChild(mkCell(d,true)); }
  for(let i=1;i<=last.getDate();i++){ const d=new Date(cy,cm,i); g.appendChild(mkCell(d,false,ds(d)===todStr)); }
  const rem=7-((sdow+last.getDate())%7);
  if(rem<7) for(let i=1;i<=rem;i++){ const d=new Date(cy,cm+1,i); g.appendChild(mkCell(d,true)); }
}

function mkCell(date, other, isToday){
  const dstr=ds(date);
  const cell=document.createElement('div');
  cell.className='dc'+(other?' other':'')+(isToday?' tod':'')+(selDay===dstr?' sel':'');
  const chips=getChipsForDay(dstr);
  const dow=date.getDay();
  const holName=HOLIDAYS_2026[dstr];
  const isHol=!!holName;
  const dnCls=isHol?'hol':dow===0?'sun':dow===6?'sat':'';
  let html=`<div style="display:flex;align-items:center;gap:3px;margin-bottom:2px">
    <div class="dn${dnCls?' '+dnCls:''}" style="margin-bottom:0">${date.getDate()}</div>
    ${isHol?`<span class="hol-label" style="margin-bottom:0">쉬는날🙌</span>`:''}
  </div>`;
  const barChips=chips.filter(c=>c.style==='bar');
  const regChips=chips.filter(c=>c.style!=='bar');
  /* 일반 칩 먼저 */
  regChips.slice(0,3).forEach(ch=>{
    const bg=ch.color.bg, tx=ch.color.tx, mn=ch.color.main;
    const opacity=ch.style==='alert'||ch.style==='deadline'?'0.75':ch.style==='end'?'0.85':'1';
    const bl=ch.style==='alert'?`2px solid ${mn}`:ch.style==='end'?`2px solid ${mn}`:'none';
    const extra=ch.style==='end'?'text-decoration:line-through;':'';
    html+=`<div class="chip" style="background:${bg};color:${tx};border-left:${bl};opacity:${opacity}">
      <div class="chip-dot" style="background:${mn}"></div>
      <span class="chip-txt" style="${extra}">${ch.label}</span>
    </div>`;
  });
  if(regChips.length>3) html+=`<div class="chip-more">+${regChips.length-3}개 더</div>`;

  /* 퀵윈 바 — 셀 하단 절대위치 고정으로 항상 같은 높이에 정렬 */
  if(barChips.length>0){
    html+=`<div class="bar-wrap">`;
    barChips.forEach(ch=>{
      const mn=ch.color.main;
      const pos=ch.barPos;
      const cls='bar-item bar-'+pos;
      const inner=(pos==='start'||pos==='solo')
        ?`<span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ch.label}</span>`
        :``;
      const borderR=pos==='start'?'border-radius:4px 0 0 4px':pos==='end'?'border-radius:0 4px 4px 0':pos==='solo'?'border-radius:4px':'border-radius:0';
      const ml=pos==='start'||pos==='solo'?'margin-left:6px':'margin-left:-1px';
      const mr=pos==='end'||pos==='solo'?'margin-right:6px':'margin-right:-1px';
      html+=`<div class="${cls}" style="background:${mn};${borderR};${ml};${mr};padding:0 5px;">${inner}</div>`;
    });
    html+=`</div>`;
  }
  cell.innerHTML=html;

  cell.addEventListener('click',()=>{ selDay=dstr; renderCal(); renderPanel(date); });
  return cell;
}

/* ── 데일리 체크리스트 ── */
function renderChk(){
  const el=document.getElementById('pane-chk'); el.innerHTML='';
  const items=getChkItems(selDay);
  if(!items.length){ el.innerHTML='<div class="empty">이 날 체크할 항목이 없습니다</div>'; return; }
  items.forEach(item=>el.appendChild(mkRow(item)));
}

function getChkItems(dstr){
  const items=[];
  // 오늘이 마감 기한인 업무
  tasks.filter(t=>t.deadline===dstr||t.due===dstr).forEach(t=>{
    items.push({ type:'task', id:t.id, brand:t.brand, media:t.media,
      label:fmtChip(t.brand,t.media,t.summary),
      sub:t.content||(t.deadline&&t.deadline!==t.due?`마감일: ${t.deadline}`:''),
      done:t.done, pill:t.deadline===dstr?'마감':'', pillStyle:'dl' });
  });
  // 오늘이 일정 시작/종료/알림일인 스케줄
  schedules.forEach(s=>{
    const alertDate=addDays(s.endDate,s.type==='계약'?-14:-2);
    if(s.startDate===dstr){
      items.push({ type:'schedule', id:s.id, brand:s.brand, media:s.media,
        label:fmtChip(s.brand,s.media,s.summary)+' 시작',
        sub:s.content||`${s.startDate} ~ ${s.endDate}`,
        done:s.done, pill:s.type==='계약'?'계약':'소재교체', pillStyle:s.type==='계약'?'contract':'event' });
    }
    if(alertDate===dstr && alertDate!==s.startDate && alertDate!==s.endDate){
      const label=s.type==='계약'?'D-14 재계약 협의':'D-2 소재 교체 체크';
      items.push({ type:'schedule', id:s.id, brand:s.brand, media:s.media,
        label:`[${s.brand}] ${s.media} ${label}`,
        sub:`종료일: ${s.endDate}`,
        done:s.done, pill:label, pillStyle:'alert' });
    }
    if(s.endDate===dstr){
      items.push({ type:'schedule', id:s.id, brand:s.brand, media:s.media,
        label:fmtChip(s.brand,s.media,s.summary)+' 종료',
        sub:s.content||'종료 후 기존 소재 복구 확인',
        done:s.done, pill:s.type==='계약'?'계약종료':'소재종료', pillStyle:'end' });
    }
  });
  // 정기 반복 업무
  getRecurring(dstr).forEach(r=>items.push(r));
  return items;
}

/* ── 금주 스케줄 ── */
function renderWeek(){
  const el=document.getElementById('pane-week'); el.innerHTML='';
  const {mon,sun}=getWeekRange();
  const items=getWeekItems(mon,sun);
  el.innerHTML=`<div style="font-size:10px;color:var(--tx3);margin-bottom:10px">${mon.slice(5).replace('-','/')} ~ ${sun.slice(5).replace('-','/')} 금주 일정</div>`;
  if(!items.length){ el.innerHTML+='<div class="empty">이번 주 일정이 없습니다</div>'; return; }
  // 날짜순 정렬
  items.sort((a,b)=>a.date.localeCompare(b.date));
  let lastDate='';
  items.forEach(item=>{
    if(item.date!==lastDate){
      const d=new Date(item.date+'T00:00:00');
      const hd=document.createElement('div'); hd.className='sec-hd';
      hd.textContent=`${d.getMonth()+1}/${d.getDate()} (${DAYS[d.getDay()]})`;
      el.appendChild(hd); lastDate=item.date;
    }
    el.appendChild(mkRow(item));
  });
}

function getWeekRange(){
  const ref=new Date(selDay+'T00:00:00');
  const dow=ref.getDay();
  const mon=new Date(ref); mon.setDate(ref.getDate()-(dow===0?6:dow-1));
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  return {mon:ds(mon),sun:ds(sun)};
}

function getWeekItems(monStr,sunStr){
  const items=[];
  tasks.forEach(t=>{
    if(t.deadline>=monStr&&t.deadline<=sunStr)
      items.push({ type:'task', id:t.id, brand:t.brand, media:t.media, date:t.deadline,
        label:fmtChip(t.brand,t.media,t.summary),
        sub:t.content||'', done:t.done,
        pill:'마감', pillStyle:'dl' });
    else if(t.due>=monStr&&t.due<=sunStr&&(!t.deadline||t.deadline<monStr||t.deadline>sunStr))
      items.push({ type:'task', id:t.id, brand:t.brand, media:t.media, date:t.due,
        label:fmtChip(t.brand,t.media,t.summary),
        sub:t.content||'', done:t.done, pill:'', pillStyle:'' });
  });
  schedules.forEach(s=>{
    const alertDate=addDays(s.endDate,s.type==='계약'?-14:-2);
    if(s.startDate>=monStr&&s.startDate<=sunStr)
      items.push({ type:'schedule', id:s.id, brand:s.brand, media:s.media, date:s.startDate,
        label:fmtChip(s.brand,s.media,s.summary)+' 시작',
        sub:s.content||`${s.startDate} ~ ${s.endDate}`, done:s.done,
        pill:s.type==='계약'?'계약':'소재교체', pillStyle:s.type==='계약'?'contract':'event' });
    if(alertDate>=monStr&&alertDate<=sunStr&&alertDate!==s.startDate&&alertDate!==s.endDate){
      const alertLabel=s.type==='계약'?'D-14 재계약 협의':'D-2 소재 교체 체크';
      items.push({ type:'schedule', id:s.id, brand:s.brand, media:s.media, date:alertDate,
        label:`[${s.brand}] ${s.media} ${alertLabel}`,
        sub:`종료일: ${s.endDate}`, done:s.done, pill:alertLabel, pillStyle:'alert' });
    }
    if(s.endDate>=monStr&&s.endDate<=sunStr)
      items.push({ type:'schedule', id:s.id, brand:s.brand, media:s.media, date:s.endDate,
        label:fmtChip(s.brand,s.media,s.summary)+' 종료',
        sub:s.content||'종료 후 기존 소재 복구 확인', done:s.done,
        pill:s.type==='계약'?'계약종료':'소재종료', pillStyle:'end' });
  });
  // 정기 반복 업무 (이번 주 월·수 모두)
  let d=new Date(monStr+'T00:00:00');
  while(ds(d)<=sunStr){
    const dstr=ds(d);
    getRecurring(dstr).forEach(r=>items.push({...r, date:dstr}));
    d.setDate(d.getDate()+1);
  }
  return items;
}

/* ── 공통 Row 생성 ── */
function mkRow(item){
  const c=bc(item.brand);
  const row=document.createElement('div'); row.className='row';

  // 체크박스
  const ck=document.createElement('div'); ck.className='ck'+(item.done?' done':'');
  ck.addEventListener('click',e=>{
    e.stopPropagation();
    if(item.type==='recurring'){
    const newVal=!ckd[item.id];
    ckd[item.id]=newVal; ck.classList.toggle('done'); const t=ck.closest('.row')?.querySelector('.row-title'); if(t)t.classList.toggle('done');
    fbPatch('ckd', {[item.id.replace(/[.#$\[\]]/g,'_')]: newVal});
    return;
  }
    toggleDone(item.type,item.id);
  });
  row.appendChild(ck);

  // 브랜드 dot
  const dot=document.createElement('div'); dot.className='b-dot'; dot.style.background=c.main;
  row.appendChild(dot);

  // 본문
  const body=document.createElement('div'); body.className='row-body';
  const title=document.createElement('div');
  title.className='row-title'+(item.done?' done':'');
  title.textContent=item.label;
  body.appendChild(title);
  if(item.sub){
    const sub=document.createElement('div'); sub.className='row-sub'; sub.textContent=item.sub;
    body.appendChild(sub);
  }
  if(item.pill){
    const pills=document.createElement('div'); pills.className='row-pills';
    const p=document.createElement('span');
    p.className='pill pill-'+(item.pillStyle||'');
    p.textContent=item.pill; pills.appendChild(p);
    body.appendChild(pills);
  }
  row.appendChild(body);

  // 수정/삭제 버튼 (정기 업무는 표시 안 함)
  if(item.type==='recurring') return row;
  const acts=document.createElement('div'); acts.className='row-acts';
  const editBtn=document.createElement('button'); editBtn.className='act-btn'; editBtn.textContent='수정';
  editBtn.addEventListener('click',e=>{e.stopPropagation();openEditModal(item.type,item.id);});
  const delBtn=document.createElement('button'); delBtn.className='act-btn del'; delBtn.textContent='삭제';
  delBtn.addEventListener('click',e=>{e.stopPropagation();deleteItem(item.type,item.id);});
  acts.appendChild(editBtn); acts.appendChild(delBtn);
  row.appendChild(acts);
  return row;
}

/* ════════════════════════════════════════
   ACTIONS
════════════════════════════════════════ */
function toggleDone(type,id){
  // 로컬 즉시 토글 후 렌더링
  if(type==='task'){ const t=tasks.find(x=>x.id===id); if(t) t.done=!t.done; }
  else { const s=schedules.find(x=>x.id===id); if(s) s.done=!s.done; }
  saveLocal();
  ra();
  // Firebase REST API 업데이트
  const cur2=(type==='task'?tasks:schedules).find(x=>x.id===id);
  if(cur2) fbPatch(`${type==='task'?'tasks':'schedules'}/${id}`,{done:cur2.done});
}

const deletingIds=new Set();
function deleteItem(type,id){
  // 로컬 즉시 삭제
  deletingIds.add(String(id));
  if(type==='task') tasks=tasks.filter(x=>String(x.id)!==String(id));
  else schedules=schedules.filter(x=>String(x.id)!==String(id));
  saveLocal();
  ra();
  // Firebase REST API 삭제
  fbDelete(`${type==='task'?'tasks':'schedules'}/${id}`)
    .then(()=>deletingIds.delete(String(id)));
}

function ra(){
  renderCal();
  const d=new Date(selDay+'T00:00:00'); renderPanel(d);
  renderExpiryBar();
}

function saveTask(){
  const brand=document.getElementById('t-brand').value;
  const summary=document.getElementById('t-summary').value.trim();
  const due=document.getElementById('t-due').value;
  if(!brand||!summary||!due){alert('브랜드, 업무 요약, 날짜는 필수입니다');return;}
  const data={ brand, media:document.getElementById('t-media').value,
    summary, content:document.getElementById('t-content').value.trim(),
    due, deadline:document.getElementById('t-deadline').value||due, done:false };
  const tempId='local-'+Date.now();
  tasks.push({id:tempId,...data});
  saveLocal(); ra(); closeModal('task');
  fbPost('tasks',data).then(fbId=>{
    if(fbId){ const t=tasks.find(x=>x.id===tempId); if(t) t.id=fbId; saveLocal(); }
  });
}

function saveSchedule(){
  const brand=document.getElementById('s-brand').value;
  const summary=document.getElementById('s-summary').value.trim();
  const start=document.getElementById('s-start').value;
  const end=document.getElementById('s-end').value;

  const data={ brand, media:document.getElementById('s-media').value,
    type:document.getElementById('s-type').value,
    summary, content:document.getElementById('s-content').value.trim(),
    startDate:start, endDate:end, done:false };
  const tempId='local-'+Date.now();
  schedules.push({id:tempId,...data});
  saveLocal(); ra(); closeModal('schedule');
  fbPost('schedules',data).then(fbId=>{
    if(fbId){ const s=schedules.find(x=>x.id===tempId); if(s) s.id=fbId; saveLocal(); }
  });
}

   MODALS — 수정
════════════════════════════════════════ */
function openEditModal(type,id){
  editCtx={type,id};
  document.getElementById('edit-task-fields').style.display=type==='task'?'block':'none';
  document.getElementById('edit-sch-fields').style.display=type==='schedule'?'block':'none';
  document.getElementById('edit-title').textContent=type==='task'?'업무 수정':'일정 수정';

  if(type==='task'){
    const t=tasks.find(x=>x.id===id); if(!t)return;
    fillBrandSelect('et-brand');
    document.getElementById('et-brand').value=t.brand;
    document.getElementById('et-media').value=t.media;
    document.getElementById('et-summary').value=t.summary;
    document.getElementById('et-content').value=t.content||'';
    document.getElementById('et-due').value=t.due;
    document.getElementById('et-deadline').value=t.deadline||t.due;
  } else {
    const s=schedules.find(x=>x.id===id); if(!s)return;
    fillBrandSelect('es-brand');
    document.getElementById('es-brand').value=s.brand;
    document.getElementById('es-media').value=s.media;
    document.getElementById('es-type').value=s.type;
    document.getElementById('es-summary').value=s.summary;
    document.getElementById('es-content').value=s.content||'';
    document.getElementById('es-start').value=s.startDate;
    document.getElementById('es-end').value=s.endDate;
  }
  document.getElementById('modal-edit').classList.add('open');
}

function closeEditModal(){
  document.getElementById('modal-edit').classList.remove('open');
  editCtx=null;
}

function saveEdit(){
  if(!editCtx)return;
  const {type,id}=editCtx;
  let data={};
  if(type==='task'){
    const summary=document.getElementById('et-summary').value.trim();
    if(!summary){alert('업무 요약은 필수입니다');return;}
    const t=tasks.find(x=>x.id===id)||{};
    data={ brand:document.getElementById('et-brand').value,
      media:document.getElementById('et-media').value, summary,
      content:document.getElementById('et-content').value.trim(),
      due:document.getElementById('et-due').value||t.due,
      deadline:document.getElementById('et-deadline').value||t.due,
      done:t.done||false };
  } else {
    const summary=document.getElementById('es-summary').value.trim();
    if(!summary){alert('업무 요약은 필수입니다');return;}
    const s=schedules.find(x=>x.id===id)||{};
    data={ brand:document.getElementById('es-brand').value,
      media:document.getElementById('es-media').value,
      type:document.getElementById('es-type').value, summary,
      content:document.getElementById('es-content').value.trim(),
      startDate:document.getElementById('es-start').value||s.startDate,
      endDate:document.getElementById('es-end').value||s.endDate,
      done:s.done||false };
  }
  if(type==='task'){ const t=tasks.find(x=>x.id===id); if(t) Object.assign(t,data); }
  else { const s=schedules.find(x=>x.id===id); if(s) Object.assign(s,data); }
  saveLocal();
  ra();
  fbPut(`${type==='task'?'tasks':'schedules'}/${id}`, data);
  closeEditModal();
}

function fillBrandSelect(elId){
  const s=document.getElementById(elId); s.innerHTML='';

/* ════════════════════════════════════════
   FIREBASE 중복 SEED 정리 (최초 1회)
════════════════════════════════════════ */
async function cleanupSeedDuplicates(){
  try{
    const fbSchedules = await fbGet('schedules');
    if(!fbSchedules) return;
    const toDelete=[];
    for(const [k,v] of Object.entries(fbSchedules)){
      if(SEED_SCHEDULES.some(s=>s.brand===v.brand&&s.startDate===v.startDate&&s.endDate===v.endDate&&s.media===v.media))
        toDelete.push(k);
    }
    for(const k of toDelete) await fbDelete(`schedules/${k}`);
  }catch(e){ console.warn('cleanup failed', e); }
}

/* ════════════════════════════════════════
   FIREBASE REST API 동기화
════════════════════════════════════════ */
async function syncFromFirebase(){
  try{
    const [fbTasks, fbSchedules] = await Promise.all([
      fbGet('tasks'), fbGet('schedules')
    ]);

    let changed = false;

    if(fbTasks !== null){
      tasks = Object.entries(fbTasks||{})
        .filter(([k])=>!deletingIds.has(k))
        .map(([k,v])=>({id:k,...v}));
      changed = true;
    }

    if(fbSchedules !== null){
      const userSchedules = Object.entries(fbSchedules||{})
        .filter(([k])=>!deletingIds.has(k))
        .map(([k,v])=>({id:k,...v}))
        .filter(u=>!SEED_SCHEDULES.some(s=>
          s.brand===u.brand && s.startDate===u.startDate &&
          s.endDate===u.endDate && s.media===u.media
        ));
      schedules = [...SEED_SCHEDULES, ...userSchedules];
      changed = true;
    } else {
      schedules = [...SEED_SCHEDULES];
      changed = true;
    }

    if(changed){
      saveLocal();
      renderCal();
      renderExpiryBar();
      if(curTab==='todo') renderTodo();
      const d=new Date(selDay+'T00:00:00'); renderPanel(d);
  // todos도 동기화
  loadTodos();
      setStatus(true);
    }
  }catch(e){
    setStatus(false);
  }
}

   알림 시스템 — 브검/퀵윈 주의 일정
════════════════════════════════════════ */
function getAlertItems(){
  const alerts=[];
  schedules.forEach(s=>{
    const isBrk=s.media==='브검', isQwk=s.media==='퀵윈';
    if(!isBrk&&!isQwk) return;
    const start=s.startDate, end=s.endDate;
    const dEnd=Math.round((new Date(end+'T00:00:00')-new Date(todStr+'T00:00:00'))/(1000*60*60*24));
    const dStart=Math.round((new Date(start+'T00:00:00')-new Date(todStr+'T00:00:00'))/(1000*60*60*24));
    const label=fmtChip(s.brand, s.media, s.summary);
    // 당일 시작
    if(dStart===0) alerts.push({cls:'alert-today',icon:'🟢',title:label+' 시작',sub:`오늘 시작 → 종료: ${end}`,priority:1});
    // 당일 종료
    if(dEnd===0) alerts.push({cls:'alert-end',icon:'🏁',title:label+' 종료',sub:'오늘 종료 — 기존 소재 복구 확인!',priority:0});
    // D-2 (퀵윈)
    if(isQwk&&dEnd===2) alerts.push({cls:'alert-d2',icon:'🔴',title:`[D-2] ${label}`,sub:`${end} 종료 — 소재 교체 체크!`,priority:0});
    // D-7
    if(dEnd===7) alerts.push({cls:'alert-d7',icon:'⚠️',title:`[D-7] ${label}`,sub:`${end} 종료 — 일주일 남았어요`,priority:2});
    // D-14 (브검 재계약)
    if(isBrk&&dEnd===14) alerts.push({cls:'alert-d14',icon:'🔶',title:`[D-14] ${label}`,sub:`${end} 종료 — 재계약 협의 시작!`,priority:1});
  });
  return alerts.sort((a,b)=>a.priority-b.priority);
}

function openAlertPopup(){
  // 오늘 하루 보지 않기 체크
  const snoozed=localStorage.getItem('alert_snooze');
  if(snoozed===todStr) return;
  const alerts=getAlertItems();
  if(!alerts.length) return;
  const list=document.getElementById('alert-popup-list');
  list.innerHTML=alerts.map(a=>`

      <span class="alert-icon" style="font-size:18px">${a.icon}</span>

        <div class="alert-sub">${a.sub}</div>
      </div>
    </div>`).join('');
  document.getElementById('modal-alert').classList.add('open');
}

/* ════════════════════════════════════════
   이번 달 만료 예정 브검/퀵윈 요약 바
════════════════════════════════════════ */
function renderExpiryBar(){
  const bar=document.getElementById('expiry-bar');
  if(!bar) return;
  const monthEnd=new Date(cy, cm+1, 0);
  const monthEndStr=ds(monthEnd);

  const items=schedules
    .filter(s=>(s.media==='브검'||s.media==='퀵윈') && s.endDate<=monthEndStr)
    .map(s=>{
      const dEnd=Math.round((new Date(s.endDate+'T00:00:00')-new Date(todStr+'T00:00:00'))/(1000*60*60*24));
      return {...s, dEnd};
    })
    .filter(s=>s.dEnd<=0) // D+1 이상(종료됨)은 제외, 오늘 포함 D-N만 표시
    .sort((a,b)=>a.dEnd-b.dEnd);

  bar.className='expiry-bar';
  if(!items.length){ bar.style.display='none'; return; }
  bar.style.display='grid';

  const bc2=key=>BRANDS.find(b=>b.key===key)||{main:'#888'};
  bar.innerHTML=items.map(s=>{
    const d=s.dEnd;
    const cls=d<=7?'exp-urgent':d<=14?'exp-warn':'exp-ok';
    const dotColor=bc2(s.brand).main;
    const label=d===0?'오늘 종료!':d<0?`D${d}`:d<=7?`D-${d} ⚠️`:`D-${d}`;
    return `<div class="exp-card ${cls}" title="${s.endDate} 종료">
      <div class="exp-card-dot" style="background:${dotColor}"></div>
      <div class="exp-card-body">
        <div class="exp-card-name">[${s.brand}] ${s.media}</div>
        <span class="exp-card-badge">${label}</span>
      </div>
    </div>`;
  }).join('');
}

function renderTodo(){
  const el=document.getElementById('pane-todo'); if(!el) return;
  el.innerHTML='';
  // ── 공통 섹션 ──
  const common=todos.filter(t=>t.person==='공통');
  el.appendChild(makeTodoSection('📋 공통', '공통', common));

  // ── 팀원별 섹션 ──
  MEMBERS.forEach(m=>{
    const items=todos.filter(t=>t.person===m);
    el.appendChild(makeTodoSection(`👤 ${m}`, m, items));
  });
}

function makeTodoSection(title, person, items){
  const sec=document.createElement('div'); sec.className='todo-section';
  const hd=document.createElement('div'); hd.className='todo-section-hd';
  const visible_cnt=items.filter(t=>!t.done || (t.doneAt && t.doneAt===todStr));
  const cnt=visible_cnt.filter(t=>!t.done).length;
  hd.innerHTML=`<span>${title} <span style="opacity:.5">${cnt>0?`(${cnt})`:''}  </span></span>`;
  const addBtn=document.createElement('button'); addBtn.className='todo-add-btn';
  addBtn.textContent='+ 추가'; addBtn.onclick=()=>openTodoModal(person);
  hd.appendChild(addBtn); sec.appendChild(hd);

  if(!items.length){
    const emp=document.createElement('div'); emp.className='todo-empty';
    emp.textContent='할 일이 없어요 🎉'; sec.appendChild(emp); return sec;
  }

  // 미완료 먼저, 우선순위순
  // 완료 처리한 날짜가 오늘이 아니면 숨김 (다음날 자동 제거)
  const visible=items.filter(t=>!t.done || (t.doneAt && t.doneAt===todStr));
  const sorted=[...visible].sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    return (a.due||'9999')>(b.due||'9999')?1:-1;
  });

  sorted.forEach(t=>{
    const row=document.createElement('div'); row.className='todo-item';
    const ck=document.createElement('div');
    ck.className='ck'+(t.done?' done':'');
    ck.onclick=()=>toggleTodo(t.id);
    row.appendChild(ck);

    const body=document.createElement('div'); body.className='todo-body';
    const txt=document.createElement('div');
    txt.className='todo-text'+(t.done?' done':'');
    txt.textContent=t.text; body.appendChild(txt);

    const meta=document.createElement('div'); meta.className='todo-meta';
    if(t.brand){
      const bp=document.createElement('span');
      const bc2=bc(t.brand);
      bp.className='todo-pill';
      bp.style.cssText=`background:${bc2.bg};color:${bc2.tx}`;
      bp.textContent=t.brand; meta.appendChild(bp);
    }
    if(t.due){
      const dp=document.createElement('span');
      dp.className='todo-due'+(t.due<todStr&&!t.done?' overdue':'');
      const dDiff=Math.round((new Date(t.due+'T00:00:00')-new Date(todStr+'T00:00:00'))/(86400000));
      dp.textContent=t.due<todStr&&!t.done?`⚠️ ${t.due} 마감 지남`:dDiff===0?'📅 오늘 마감':`📅 ${t.due}`;
      meta.appendChild(dp);
    }
    body.appendChild(meta); row.appendChild(body);

    const acts=document.createElement('div');
    acts.style.cssText='display:flex;gap:3px;flex-shrink:0;opacity:0;transition:.15s';
    row.addEventListener('mouseenter',()=>acts.style.opacity='1');
    row.addEventListener('mouseleave',()=>acts.style.opacity='0');
    const editBtn=document.createElement('button'); editBtn.className='act-btn';
    editBtn.textContent='수정'; editBtn.onclick=()=>openTodoEditModal(t.id);
    const del=document.createElement('button'); del.className='act-btn del';
    del.textContent='삭제'; del.onclick=()=>deleteTodo(t.id);
    acts.appendChild(editBtn); acts.appendChild(del);
    row.appendChild(acts); sec.appendChild(row);
  });
  return sec;
}

function generateFortune(person, dateStr){

}

  /* localStorage로 즉시 렌더 → Firebase REST API로 최신 데이터 가져오기 */
  loadLocal();
  renderCal();
  const initDay=new Date(todStr+'T00:00:00'); renderPanel(initDay);

  cleanupSeedDuplicates().then(()=>syncFromFirebase()); // 중복 정리 후 동기화
  setInterval(syncFromFirebase, 30000);        // 30초마다 자동 동기화
  loadFortune();
  loadTodos();
}
init();
</script>
</body>
</html>
